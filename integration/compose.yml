services:
  windows:
    image: dockurr/windows
    container_name: windows
    environment:
      VERSION: "11"
      GPU: "Y"
      USER_PORTS: "3389,9876"
    devices:
      - /dev/dri
      - /dev/kvm
      - /dev/net/tun
    cap_add:
      - NET_ADMIN
    ports:
      - 8006:8006
      - 3389:3389/tcp
      - 3389:3389/udp
      - 6123:6123 # VS Code debug port
      - 9876:9876 # TCP port for sketchup-link live sync
    volumes:
      - ../../../../../windows:/storage
      - ../../../../../shared:/shared
      # TODO share socket
      - ../../../../../oem:/oem
      - ./scripts:/shared/scripts
    restart: always
    stop_grace_period: 2m
  blender:
    build:
      context: .
      dockerfile: Dockerfile.blender
    container_name: blender
    volumes:
      - ../:/plugin
      - ../tests/bdd/screenshots:/screenshots
    environment:
      - PYTHONPATH=/plugin
    depends_on:
      - windows
    restart: "no"
